<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高輪テニスクラブ 参加管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6Zd7D1DaT1WhiaZxEtJXVLFv56UJB6OE",
            authDomain: "takanawa-tennis.firebaseapp.com",
            projectId: "takanawa-tennis",
            storageBucket: "takanawa-tennis.firebasestorage.app",
            messagingSenderId: "935422531083",
            appId: "1:935422531083:web:3ef126e647929f58b7d90e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'takanawa-tennis-v1';

        let user = null;
        let practiceDates = [];
        let allRegistrations = [];
        let myRegistrations = [];
        let recruitmentPhase = 1;
        let visibleParticipantsDateId = null;

        const loadingOverlay = document.getElementById('loading-overlay');
        const adminToggle = document.getElementById('admin-toggle');
        const adminPanel = document.getElementById('admin-panel');
        const memberPanel = document.getElementById('member-panel');
        const dateList = document.getElementById('date-list');
        const adminDateList = document.getElementById('admin-date-list');
        const phaseIndicator = document.getElementById('phase-indicator');
        const phaseToggleBtn = document.getElementById('phase-toggle-btn');

        signInAnonymously(auth).catch(err => console.error("Auth Error:", err));

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) setupListeners();
        });

        const setupListeners = () => {
            if (!user) return;
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'practice_dates'), (snapshot) => {
                practiceDates = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => a.date.localeCompare(b.date));
                renderApp();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), (snapshot) => {
                allRegistrations = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                myRegistrations = allRegistrations.filter(r => r.userId === user.uid);
                renderApp();
            });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), (snapshot) => {
                if (snapshot.exists()) {
                    recruitmentPhase = snapshot.data().phase || 1;
                    renderApp();
                } else {
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { phase: 1 });
                }
            });
        };

        window.addPracticeDate = async (e) => {
            e.preventDefault();
            const date = document.getElementById('new-date').value;
            const cap = parseInt(document.getElementById('new-cap').value) || 14;
            if (!date) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'practice_dates'), { date, maxCapacity: cap });
            e.target.reset();
        };

        window.deleteDate = async (id) => {
            if (confirm('削除しますか？')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'practice_dates', id));
                allRegistrations.filter(r => r.dateId === id).forEach(async r => await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'registrations', r.id)));
            }
        };

        window.toggleParticipants = (id) => {
            visibleParticipantsDateId = (visibleParticipantsDateId === id) ? null : id;
            renderApp();
        };

        window.togglePhase = async () => {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { phase: recruitmentPhase === 1 ? 2 : 1 });
        };

        window.register = async (dateId) => {
            if (recruitmentPhase === 1 && myRegistrations.length >= 2) return alert('第1次募集は2回までです。');
            const dateObj = practiceDates.find(d => d.id === dateId);
            if (allRegistrations.filter(r => r.dateId === dateId).length >= dateObj.maxCapacity) return alert('満員です。');
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), { userId: user.uid, dateId, timestamp: Date.now() });
        };

        window.cancel = async (dateId) => {
            const reg = myRegistrations.find(r => r.dateId === dateId);
            if (reg) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'registrations', reg.id));
        };

        const renderApp = () => {
            loadingOverlay.classList.add('hidden');
            phaseIndicator.innerText = recruitmentPhase === 1 ? '第1次 募集期間（2回まで）' : '第2次 募集期間（制限なし）';
            phaseToggleBtn.innerText = recruitmentPhase === 1 ? '第2次募集へ切り替え' : '第1次募集へ戻す';
            adminDateList.innerHTML = practiceDates.map(d => `<div class="flex justify-between items-center p-3 bg-slate-50 rounded-lg mb-2 text-sm"><span class="font-bold">${d.date} (${allRegistrations.filter(r => r.dateId === d.id).length}/${d.maxCapacity})</span><button onclick="deleteDate('${d.id}')" class="text-red-400 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`).join('') || '<p class="text-center text-slate-400 text-xs py-4">日程なし</p>';
            dateList.innerHTML = practiceDates.map(d => {
                const regs = allRegistrations.filter(r => r.dateId === d.id).sort((a, b) => a.timestamp - b.timestamp);
                const registered = myRegistrations.some(r => r.dateId === d.id);
                const full = regs.length >= d.maxCapacity;
                const isExpanded = visibleParticipantsDateId === d.id;
                return `<div class="bg-white border ${registered ? 'border-emerald-500 ring-1 ring-emerald-500' : 'border-slate-200'} rounded-xl p-4 shadow-sm mb-3"><div class="flex justify-between items-center mb-3"><div><h3 class="font-bold text-slate-800">${d.date}</h3><span class="text-[10px] px-2 py-0.5 rounded-full ${full ? 'bg-red-50 text-red-500' : 'bg-emerald-50 text-emerald-600'}">空き: ${d.maxCapacity - regs.length} / ${d.maxCapacity}人</span></div><button onclick="toggleParticipants('${d.id}')" class="text-slate-400"><i data-lucide="${isExpanded ? 'users' : 'user-plus'}" class="w-5 h-5 ${isExpanded ? 'text-emerald-600' : ''}"></i></button></div>${isExpanded ? `<div class="mb-4 bg-slate-50 rounded-lg p-3 space-y-1">${regs.map((r, i) => `<div class="flex justify-between text-[11px] py-1 border-b border-white last:border-0"><span class="${r.userId === user.uid ? 'text-emerald-600 font-bold' : 'text-slate-600'}">${i + 1}. ID:${r.userId.slice(-6)} ${r.userId === user.uid ? '(あなた)' : ''}</span><span class="text-slate-300 text-[9px]">${new Date(r.timestamp).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'})}</span></div>`).join('') || '<p class="text-[10px] text-slate-300">まだ参加者はいません</p>'}</div>` : ''}<button onclick="${registered ? 'cancel' : 'register'}('${d.id}')" ${!registered && full ? 'disabled' : ''} class="w-full py-2.5 rounded-lg font-bold text-sm transition-all ${registered ? 'bg-slate-100 text-slate-500' : (full ? 'bg-slate-50 text-slate-300' : 'bg-emerald-600 text-white shadow-md')}">${registered ? 'キャンセルする' : (full ? '満員です' : '参加する')}</button></div>`;
            }).join('') || '<p class="text-center text-slate-400 py-10">募集中の日程はありません</p>';
            lucide.createIcons();
        };

        adminToggle.addEventListener('change', (e) => {
            adminPanel.classList.toggle('hidden', !e.target.checked);
            memberPanel.classList.toggle('hidden', e.target.checked);
        });
    </script>
    <style>
        body { font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="loading-overlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center"><div class="animate-spin rounded-full h-8 w-8 border-t-2 border-emerald-600"></div></div>
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 h-14 flex justify-between items-center shadow-sm">
        <h1 class="font-bold text-slate-800">高輪テニスクラブ</h1>
        <label class="flex items-center cursor-pointer"><input type="checkbox" id="admin-toggle" class="sr-only peer"><div class="w-9 h-5 bg-gray-200 rounded-full peer peer-checked:bg-emerald-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-4"></div><span class="ml-2 text-[10px] font-bold text-slate-400">管理者モード</span></label>
    </header>
    <main class="max-w-md mx-auto p-4 space-y-6">
        <div id="phase-indicator" class="bg-emerald-600 text-white p-3 rounded-xl shadow-md text-sm font-bold text-center"></div>
        <div id="member-panel" class="space-y-4"><h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">練習日程</h2><div id="date-list"></div></div>
        <div id="admin-panel" class="hidden space-y-6">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4"><h3 class="font-bold text-sm text-slate-800 text-center">募集フェーズ管理</h3><button id="phase-toggle-btn" onclick="togglePhase()" class="w-full py-3 bg-slate-800 text-white rounded-xl text-sm font-bold shadow-lg"></button></div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4"><h3 class="font-bold text-sm text-slate-800">日程を追加</h3><form onsubmit="addPracticeDate(event)" class="space-y-3"><input type="date" id="new-date" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"><input type="number" id="new-cap" value="14" class="w-full p-3 bg-slate-50 border rounded-xl text-sm" placeholder="定員"><button type="submit" class="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold text-sm">追加する</button></form></div>
            <div class="space-y-2"><h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">登録済み日程</h3><div id="admin-date-list" class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm"></div></div>
        </div>
    </main>
</body>
</html>

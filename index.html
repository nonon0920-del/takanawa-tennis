<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高輪テニスクラブ 参加管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        /** * 【重要】Firebase Console > Firestore Database > Rules を以下のように設定してください。
         * * rules_version = '2';
         * service cloud.firestore {
         * match /databases/{database}/documents {
         * match /artifacts/{appId}/{document=**} {
         * allow read, write: if request.auth != null;
         * }
         * }
         * }
         */
  const firebaseConfig = {
    apiKey: "AIzaSyD6Zd7D1DaT1WhiaZxEtJXVLFv56UJB6OE",
    authDomain: "takanawa-tennis.firebaseapp.com",
    projectId: "takanawa-tennis",
    storageBucket: "takanawa-tennis.firebasestorage.app",
    messagingSenderId: "935422531083",
    appId: "1:935422531083:web:3ef126e647929f58b7d90e"
  };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'takanawa-tennis-v1';

        // State
        let user = null;
        let practiceDates = [];
        let myRegistrations = [];
        let allRegistrations = [];
        let recruitmentPhase = 1;

        // UI Elements
        const loadingOverlay = document.getElementById('loading-overlay');
        const adminToggle = document.getElementById('admin-toggle');
        const adminPanel = document.getElementById('admin-panel');
        const memberPanel = document.getElementById('member-panel');
        const dateList = document.getElementById('date-list');
        const adminDateList = document.getElementById('admin-date-list');
        const phaseIndicator = document.getElementById('phase-indicator');
        const phaseToggleBtn = document.getElementById('phase-toggle-btn');

        // Modal Logic
        const showErrorMessage = (msg) => {
            const modal = document.getElementById('error-modal');
            document.getElementById('error-text').innerText = msg;
            modal.classList.remove('hidden');
        };

        window.closeErrorModal = () => {
            document.getElementById('error-modal').classList.add('hidden');
        };

        // Init Auth (Rule 3 compliant)
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth failed:", err);
                showErrorMessage("認証に失敗しました。Firebaseの設定を確認してください。");
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                setupListeners();
            }
        });

        const setupListeners = () => {
            if (!user) return;

            const errorCallback = (error) => {
                console.error("Firestore Error:", error);
                if (error.code === 'permission-denied') {
                    showErrorMessage("アクセス権限がありません。Firebase ConsoleのSecurity Rules（セキュリティルール）を確認してください。");
                }
            };

            // 1. Practice Dates
            const datesQuery = collection(db, 'artifacts', appId, 'public', 'data', 'practice_dates');
            onSnapshot(datesQuery, (snapshot) => {
                practiceDates = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                    .sort((a, b) => a.date.localeCompare(b.date));
                renderApp();
            }, errorCallback);

            // 2. Global Registrations
            const regsQuery = collection(db, 'artifacts', appId, 'public', 'data', 'registrations');
            onSnapshot(regsQuery, (snapshot) => {
                allRegistrations = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                myRegistrations = allRegistrations.filter(r => r.userId === user.uid);
                renderApp();
            }, errorCallback);

            // 3. Phase Settings
            const settingsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
            onSnapshot(settingsDoc, (snapshot) => {
                if (snapshot.exists()) {
                    recruitmentPhase = snapshot.data().phase || 1;
                    renderApp();
                } else {
                    // Initialize if not exist
                    setDoc(settingsDoc, { phase: 1 }).catch(errorCallback);
                }
            }, errorCallback);
        };

        // Actions
        window.addPracticeDate = async (e) => {
            e.preventDefault();
            if (!user) return;
            const date = document.getElementById('new-date').value;
            const cap = parseInt(document.getElementById('new-cap').value) || 12;
            if (!date) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'practice_dates'), { date, maxCapacity: cap });
                e.target.reset();
            } catch (err) { showErrorMessage("追加に失敗しました。"); }
        };

        window.deleteDate = async (id) => {
            if (!user) return;
            if (confirm('削除しますか？')) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'practice_dates', id));
                } catch (err) { showErrorMessage("削除に失敗しました。"); }
            }
        };

        window.togglePhase = async () => {
            if (!user) return;
            const nextPhase = recruitmentPhase === 1 ? 2 : 1;
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { phase: nextPhase });
            } catch (err) { showErrorMessage("フェーズ変更に失敗しました。"); }
        };

        window.register = async (dateId) => {
            if (!user) return;
            if (recruitmentPhase === 1 && myRegistrations.length >= 2) {
                alert('第1次募集は2回までです。');
                return;
            }
            const dateObj = practiceDates.find(d => d.id === dateId);
            const count = allRegistrations.filter(r => r.dateId === dateId).length;
            if (count >= dateObj.maxCapacity) {
                alert('満員です。');
                return;
            }
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), {
                    userId: user.uid,
                    dateId: dateId,
                    timestamp: Date.now()
                });
            } catch (err) { showErrorMessage("登録に失敗しました。"); }
        };

        window.cancel = async (dateId) => {
            if (!user) return;
            const reg = myRegistrations.find(r => r.dateId === dateId);
            if (reg) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'registrations', reg.id));
                } catch (err) { showErrorMessage("キャンセルに失敗しました。"); }
            }
        };

        const renderApp = () => {
            loadingOverlay.classList.add('hidden');
            phaseIndicator.innerText = recruitmentPhase === 1 ? '第1次 募集期間（2回まで）' : '第2次 募集期間（3回以上可）';
            phaseToggleBtn.innerText = recruitmentPhase === 1 ? '第2次募集へ切り替え' : '第1次募集へ戻す';

            adminDateList.innerHTML = practiceDates.map(d => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-lg mb-2 text-sm">
                    <span class="font-bold text-slate-700">${d.date} (${allRegistrations.filter(r => r.dateId === d.id).length}/${d.maxCapacity})</span>
                    <button onclick="deleteDate('${d.id}')" class="text-red-400 p-1 hover:text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('') || '<p class="text-xs text-slate-400 text-center py-4">登録された練習日はありません</p>';

            dateList.innerHTML = practiceDates.map(d => {
                const regs = allRegistrations.filter(r => r.dateId === d.id);
                const registered = myRegistrations.some(r => r.dateId === d.id);
                const full = regs.length >= d.maxCapacity;
                const isExtra = myRegistrations.length >= 3 && !registered;

                return `
                    <div class="bg-white border ${registered ? 'border-emerald-500 ring-1 ring-emerald-500' : 'border-slate-200'} rounded-xl p-4 shadow-sm transition-all">
                        <div class="flex justify-between items-center mb-3">
                            <div>
                                <h3 class="font-bold text-slate-800">${d.date}</h3>
                                <div class="flex gap-2 mt-1">
                                    <span class="text-[10px] px-2 py-0.5 rounded-full ${full ? 'bg-red-50 text-red-500' : 'bg-emerald-50 text-emerald-600'}">空き: ${d.maxCapacity - regs.length}</span>
                                    ${isExtra ? '<span class="text-[10px] bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full font-bold">追加料金</span>' : ''}
                                </div>
                            </div>
                            ${registered ? '<i data-lucide="check-circle-2" class="text-emerald-500 w-5 h-5"></i>' : ''}
                        </div>
                        <button onclick="${registered ? 'cancel' : 'register'}('${d.id}')" ${!registered && full ? 'disabled' : ''} 
                                class="w-full py-2 rounded-lg font-bold text-sm transition-all ${registered ? 'bg-slate-100 text-slate-500 hover:bg-slate-200' : (full ? 'bg-slate-50 text-slate-300 cursor-not-allowed' : 'bg-emerald-600 text-white hover:bg-emerald-700')}">
                            ${registered ? 'キャンセル' : (full ? '満員' : '参加する')}
                        </button>
                    </div>
                `;
            }).join('') || '<p class="text-slate-400 text-center py-10">現在募集中の練習日はありません</p>';
            lucide.createIcons();
        };

        adminToggle.addEventListener('change', (e) => {
            adminPanel.classList.toggle('hidden', !e.target.checked);
            memberPanel.classList.toggle('hidden', e.target.checked);
        });

        // Start
        window.onload = initAuth;
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-emerald-600"></div>
    </div>

    <!-- Error Modal -->
    <div id="error-modal" class="fixed inset-0 bg-slate-900/50 z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-xs w-full shadow-2xl text-center space-y-4">
            <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto">
                <i data-lucide="alert-triangle" class="w-6 h-6"></i>
            </div>
            <h3 class="font-bold text-slate-800">権限エラー</h3>
            <p id="error-text" class="text-xs text-slate-500 leading-relaxed"></p>
            <button onclick="closeErrorModal()" class="w-full py-2 bg-slate-800 text-white rounded-lg text-sm font-bold">閉じる</button>
        </div>
    </div>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 h-14 flex justify-between items-center shadow-sm">
        <h1 class="font-bold text-slate-800 tracking-tight">高輪テニスクラブ</h1>
        <label class="flex items-center cursor-pointer">
            <input type="checkbox" id="admin-toggle" class="sr-only peer">
            <div class="w-9 h-5 bg-gray-200 rounded-full peer peer-checked:bg-emerald-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-4"></div>
            <span class="ml-2 text-[10px] font-bold text-slate-400">ADMIN</span>
        </label>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <div id="phase-indicator" class="bg-emerald-600 text-white p-3 rounded-xl shadow-lg text-sm font-bold text-center animate-in fade-in slide-in-from-top-2 duration-500"></div>

        <div id="member-panel" class="space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">練習日程</h2>
            </div>
            <div id="date-list" class="grid grid-cols-1 gap-3"></div>
        </div>

        <div id="admin-panel" class="hidden space-y-6">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                <h3 class="font-bold text-sm text-slate-800 flex items-center"><i data-lucide="settings" class="w-4 h-4 mr-2"></i>フェーズ管理</h3>
                <button id="phase-toggle-btn" onclick="togglePhase()" class="w-full py-3 bg-slate-800 text-white rounded-xl text-sm font-bold hover:bg-slate-700 transition-all"></button>
            </div>
            
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                <h3 class="font-bold text-sm text-slate-800 flex items-center"><i data-lucide="plus-circle" class="w-4 h-4 mr-2"></i>練習日の新規追加</h3>
                <form onsubmit="addPracticeDate(event)" class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-1">練習日</label>
                        <input type="date" id="new-date" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-1">定員（デフォルト12名）</label>
                        <input type="number" id="new-cap" value="12" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                    </div>
                    <button type="submit" class="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold text-sm shadow-md hover:bg-emerald-700 transition-all">日程を追加する</button>
                </form>
            </div>

            <div class="space-y-3">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">登録済み日程の管理</h3>
                <div id="admin-date-list" class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm"></div>
            </div>
        </div>
    </main>
</body>
</html>
